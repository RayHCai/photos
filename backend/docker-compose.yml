services:
  redis:
    image: redis:7-alpine
    container_name: photos-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: photos-backend
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma

volumes:
  redis_data:
