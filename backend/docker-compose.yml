services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: photos-postgres
    environment:
      POSTGRES_USER: photos
      POSTGRES_PASSWORD: photos_dev
      POSTGRES_DB: photos
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U photos']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: photos-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: photos-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://photos:photos_dev@postgres:5432/photos?connection_limit=20
      REDIS_URL: redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma

volumes:
  postgres_data:
  redis_data:
